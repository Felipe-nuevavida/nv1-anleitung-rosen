<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Vida - Installation Guide</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fff; overflow: hidden; }
    .wrap { width:100%; height:100vh; display:flex; flex-direction:column; }

    .intro { display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; gap:3rem; background:#fff; }
    .logo-img { width:200px; height:200px; object-fit:contain; }
    .lang-row { display:flex; gap:1.2rem; flex-wrap:wrap; justify-content:center; padding:0 1rem; }
    .lang-btn {
      width:90px; height:90px; border:2px solid #d4a017; background:#fff;
      border-radius:14px; font-size:3rem; cursor:pointer;
      transition:all 0.2s; display:flex; align-items:center; justify-content:center;
      box-shadow: 0 2px 8px rgba(212,160,23,0.2);
    }
    .lang-btn:hover { border-color:#b8860b; transform:scale(1.08); box-shadow:0 4px 16px rgba(212,160,23,0.35); }
    .lang-btn:active { transform:scale(0.95); }

    .car-screen { display:none; flex-direction:column; width:100%; height:100%; background:#fff; }
    .car-screen.active { display:flex; }

    .prog-bar { width:100%; height:5px; background:#f0f0f0; display:flex; }
    .seg { flex:1; height:100%; background:#e8d5a3; transition:background 0.3s; }
    .seg.done { background:#d4a017; }
    .seg.current { background:#d4a017; }

    .car-content { flex:1; display:flex; align-items:center; justify-content:center; padding:1.5rem 2rem; position:relative; overflow:hidden; }

    .tap-l, .tap-r { position:absolute; top:0; width:22%; height:100%; cursor:pointer; z-index:10; }
    .tap-l { left:0; }
    .tap-r { right:0; }

    .slide { display:none; text-align:center; width:100%; flex-direction:column; align-items:center; gap:1.2rem; animation:fadeSlide 0.35s ease; }
    .slide.active { display:flex; }
    @keyframes fadeSlide { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .step-num {
      font-size:6rem; font-weight:800; line-height:1;
      background: linear-gradient(135deg, #c8a415 0%, #f5d87a 40%, #a07810 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter: drop-shadow(0 1px 2px rgba(180,130,0,0.25));
      font-family: Georgia, serif;
    }
    .slide h2 { font-size:1.55rem; font-weight:700; color:#1a1a1a; letter-spacing:0.01em; }
    .slide p { font-size:1.2rem; line-height:1.65; color:#444; max-width:420px; }
    .slide .warn { font-size:1.1rem; color:#b91c1c; font-weight:700; background:#fff1f1; border:1.5px solid #f5c6c6; padding:0.6rem 1rem; border-radius:10px; display:inline-block; }

    .logo-small {
      position:absolute; top:14px; right:16px;
      width:52px; height:52px; object-fit:contain; opacity:0.8;
      z-index:5; pointer-events:none;
    }

    .final-title { font-size:2rem; font-weight:800; color:#1a1a1a; letter-spacing:0.01em; }
    .support-btn {
      padding:0.9rem 2.2rem; font-size:1.1rem;
      background: linear-gradient(135deg, #c8a415, #f0c93a, #a07810);
      color:#fff; border:none; border-radius:10px; cursor:pointer;
      font-weight:700; letter-spacing:0.03em;
      box-shadow: 0 2px 10px rgba(180,130,0,0.35);
      text-decoration:none; display:inline-block; transition:all 0.2s;
    }
    .support-btn:hover { transform:scale(1.04); box-shadow:0 4px 18px rgba(180,130,0,0.45); }
    .support-btn:active { transform:scale(0.97); }

    .divider { width:60px; height:2px; background:linear-gradient(90deg,#c8a415,#f0c93a,#c8a415); border-radius:2px; margin:0 auto; }
  </style>
</head>
<body>
<div class="wrap" id="app">
  <div class="intro" id="introScreen">
    <img src="Logo_gold.png" class="logo-img" alt="Nueva Vida" onerror="this.style.display='none'">
    <div class="lang-row">
      <button class="lang-btn" onclick="startCarousel('de')">🇩🇪</button>
      <button class="lang-btn" onclick="startCarousel('en')">🇬🇧</button>
      <button class="lang-btn" onclick="startCarousel('fr')">🇫🇷</button>
      <button class="lang-btn" onclick="startCarousel('es')">🇪🇸</button>
      <button class="lang-btn" onclick="startCarousel('it')">🇮🇹</button>
    </div>
  </div>

  <div class="car-screen" id="carScreen">
    <div class="prog-bar" id="progBar">
      <div class="seg current" id="s0"></div>
      <div class="seg" id="s1"></div>
      <div class="seg" id="s2"></div>
      <div class="seg" id="s3"></div>
    </div>
    <div class="car-content">
      <div class="tap-l" onclick="prev()"></div>
      <img src="Logo_gold.png" class="logo-small" alt="" onerror="this.style.display='none'">
      <div id="slides"></div>
      <div class="tap-r" onclick="next()"></div>
    </div>
  </div>
</div>

<script>
const C = {
  de:[
    {num:'1',title:'HAUBE REINIGEN 🧼',text:'Fläche staub- und fettfrei machen.',warn:'❗ KEIN WACHS! KEINE POLITUR!'},
    {num:'2',title:'VAKUUM DRÜCKEN ✋',text:'Saugnäpfe leicht anfeuchten. Direkt auf den Saugnapf drücken – NIEMALS auf die Blüte!',warn:''},
    {num:'3',title:'SICHER ENTFERNEN 🔓',text:'Zum Abnehmen NUR an der kleinen Lasche ziehen.',warn:'❗ NIEMALS an der Blume reißen!'},
    {num:'4',title:'GUTE FAHRT! 🚗💨',text:'',warn:'❗ MAX. 80 KM/H',isFinal:true}
  ],
  en:[
    {num:'1',title:'CLEAN THE HOOD 🧼',text:'Surface must be completely dust and grease-free.',warn:'❗ NO WAX! NO POLISH!'},
    {num:'2',title:'PRESS & SECURE ✋',text:'Moisten suction cups slightly. Press the suction cup directly – NEVER press the flower!',warn:''},
    {num:'3',title:'SAFE REMOVAL 🔓',text:'To remove, pull ONLY the small tab on the suction cup.',warn:'❗ NEVER rip the flower off!'},
    {num:'4',title:'HAVE A GREAT DRIVE! 🚗💨',text:'',warn:'❗ MAX. 80 KM/H',isFinal:true}
  ],
  fr:[
    {num:'1',title:'NETTOYER LE CAPOT 🧼',text:'La surface doit être sans poussière ni graisse.',warn:'❗ PAS DE CIRE ! PAS DE POLISH !'},
    {num:'2',title:'PRESSER LA VENTOUSE ✋',text:'Humidifiez légèrement les ventouses. Appuyez directement sur la ventouse, JAMAIS sur la fleur !',warn:''},
    {num:'3',title:'RETRAIT SÉCURISÉ 🔓',text:'Pour retirer, tirez UNIQUEMENT sur la petite languette.',warn:'❗ NE JAMAIS arracher la fleur !'},
    {num:'4',title:'BONNE ROUTE ! 🚗💨',text:'',warn:'❗ MAX. 80 KM/H',isFinal:true}
  ],
  es:[
    {num:'1',title:'LIMPIAR EL CAPÓ 🧼',text:'La superficie debe estar sin polvo ni grasa.',warn:'❗ ¡CERO CERA! ¡CERO PULIMIENTO!'},
    {num:'2',title:'PRESIONAR LA VENTOSA ✋',text:'Humedezca ligeramente las ventosas. Presione directamente la ventosa, ¡NUNCA la flor!',warn:''},
    {num:'3',title:'RETIRADA SEGURA 🔓',text:'Para quitar, tire SOLO de la pequeña lengüeta.',warn:'❗ ¡NUNCA arranque la flor!'},
    {num:'4',title:'¡BUEN VIAJE! 🚗💨',text:'',warn:'❗ MÁX. 80 KM/H',isFinal:true}
  ],
  it:[
    {num:'1',title:'PULIRE IL COFANO 🧼',text:'La superficie deve essere senza polvere e grasso.',warn:'❗ NIENTE CERA! NIENTE LUCIDO!'},
    {num:'2',title:'PREMERE LA VENTOSA ✋',text:'Inumidire leggermente le ventose. Premere direttamente la ventosa, MAI il fiore!',warn:''},
    {num:'3',title:'RIMOZIONE SICURA 🔓',text:'Per rimuovere, tirare SOLO la piccola linguetta.',warn:'❗ MAI strappare il fiore!'},
    {num:'4',title:'BUON VIAGGIO! 🚗💨',text:'',warn:'❗ MAX. 80 KM/H',isFinal:true}
  ]
};
const ST = {de:'Support kontaktieren',en:'Contact Support',fr:'Contacter le Support',es:'Contactar Soporte',it:'Contatta il Supporto'};

let lang='de', cur=0, timer=null;

function startCarousel(l){
  lang=l; cur=0;
  document.getElementById('introScreen').style.display='none';
  document.getElementById('carScreen').classList.add('active');
  renderSlides();
  showSlide(0);
  autoAdv();
}

function renderSlides(){
  const c=document.getElementById('slides'); c.innerHTML='';
  C[lang].forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='slide'+(i===0?' active':'');
    if(s.isFinal){
      d.innerHTML=`
        <div class="step-num">${s.num}</div>
        <div class="divider"></div>
        <div class="final-title">${s.title}</div>
        ${s.warn?`<div class="warn">${s.warn}</div>`:''}
        <a href="mailto:info@nuevavida-ftv.de" class="support-btn">${ST[lang]}</a>`;
    } else {
      d.innerHTML=`
        <div class="step-num">${s.num}</div>
        <div class="divider"></div>
        <h2>${s.title}</h2>
        ${s.text?`<p>${s.text}</p>`:''}
        ${s.warn?`<div class="warn">${s.warn}</div>`:''}`;
    }
    c.appendChild(d);
  });
}

function showSlide(i){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.seg').forEach((s,j)=>{
    s.classList.remove('current','done');
    if(j<i) s.classList.add('done');
    else if(j===i) s.classList.add('current');
  });
  const slides=document.querySelectorAll('.slide');
  if(slides[i]) slides[i].classList.add('active');
}

function next(){
  if(cur<C[lang].length-1){ cur++; showSlide(cur); if(cur<C[lang].length-1) resetAdv(); else clearTimeout(timer); }
}
function prev(){
  if(cur>0){ cur--; showSlide(cur); resetAdv(); }
}
function autoAdv(){
  if(cur<C[lang].length-1) timer=setTimeout(()=>{ next(); autoAdv(); },5000);
}
function resetAdv(){ clearTimeout(timer); autoAdv(); }
</script>
</body>
</html>
